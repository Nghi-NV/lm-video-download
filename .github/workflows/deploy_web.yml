name: Deploy Web Demo to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'example/**'
      - 'pubspec.yaml'
      - '.github/workflows/deploy_web.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies for root package
        run: flutter pub get

      - name: Install dependencies for example app
        run: |
          cd example
          flutter pub get

      - name: Build Web App
        run: |
          cd example
          flutter build web --base-href "/lm-video-download/"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: example/build/web
          branch: gh-pages
