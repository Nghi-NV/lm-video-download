  path_provider: ^2.1.2
  path: ^1.9.0
  http: ^1.2.1
  encrypt: ^5.0.3
  shelf: ^1.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

